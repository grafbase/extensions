//!file:grafbase/options.proto
syntax = "proto2";

import "google/protobuf/descriptor.proto";

package grafbase.graphql;

message CompositeSchemaEntity {
  optional string entity = 1;
  optional string relation_field_name = 2;
  optional string key_field_name = 3;
}

extend google.protobuf.MessageOptions {
  optional string object_directives = 58301;
  optional string input_object_directives = 58302;
}

extend google.protobuf.FieldOptions {
  optional string output_field_directives = 58301;
  optional string input_field_directives = 58302;
  optional CompositeSchemaEntity composite_schemas_entity = 58303;
}

extend google.protobuf.EnumOptions {
  optional string enum_directives = 58301;
}

extend google.protobuf.EnumValueOptions {
  optional string enum_value_directives = 58301;
}

extend google.protobuf.ServiceOptions {
  optional bool default_to_query_fields = 58301;
  optional bool default_to_mutation_fields = 58302;
  optional string subgraph_name = 58303;
  optional string schema_directives = 58304;
}

extend google.protobuf.MethodOptions {
  optional string directives = 58301;
  optional bool is_query = 58302;
  optional bool is_mutation = 58303;
}

//!file:composite_schemas_entity.proto
syntax = "proto3";

import "grafbase/options.proto";

package test.composite;

service ProductService {
  rpc GetProduct(GetProductRequest) returns (Product);
  rpc CreateProduct(CreateProductRequest) returns (Product);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
}

// Test messages with composite schema entities
message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  // Basic usage - entity User with field id
  string user_id = 4 [(grafbase.graphql.composite_schemas_entity) = {entity: "User"}];
  // With custom relation field name
  string owner_id = 5 [(grafbase.graphql.composite_schemas_entity) = {entity: "User", relation_field_name: "owner"}];
  // Different entity type with custom key field name
  string category_id = 6 [(grafbase.graphql.composite_schemas_entity) = {entity: "Category", key_field_name: "categoryId"}];
  // Field without suffix
  string shop = 7 [(grafbase.graphql.composite_schemas_entity) = {entity: "Shop", key_field_name: "slug"}];
  // Different field type (int) with both custom names
  int32 store_id = 8 [(grafbase.graphql.composite_schemas_entity) = {entity: "Store", relation_field_name: "store", key_field_name: "number"}];
}

message Review {
  string id = 1;
  string content = 2;
  // Test multiple references to same entity
  string product_id = 3 [(grafbase.graphql.composite_schemas_entity) = {entity: "Product"}];
  string reviewer_id = 4 [(grafbase.graphql.composite_schemas_entity) = {entity: "User"}];
}

message GetProductRequest {
  string id = 1;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  string user_id = 3;
  string owner_id = 4;
  string category_id = 5;
}

message ListProductsRequest {
  int32 limit = 1;
  string cursor = 2;
}

message ListProductsResponse {
  repeated Product products = 1;
  string next_cursor = 2;
}